<div
  class="min-h-screen w-full flex items-center justify-center px-4 py-6 sm:py-10 relative overflow-hidden"
>
  <div class="absolute top-4 right-4 z-20">
    <app-language-switcher></app-language-switcher>
  </div>

  <div
    class="absolute top-[-10%] left-[-10%] w-[320px] h-[320px] sm:w-[500px] sm:h-[500px] bg-ui-green/10 rounded-full blur-[140px] pointer-events-none"
  ></div>
  <div
    class="absolute bottom-[-10%] right-[-10%] w-[320px] h-[320px] sm:w-[500px] sm:h-[500px] bg-white/5 rounded-full blur-[140px] pointer-events-none"
  ></div>

  <div class="w-full max-w-md z-10 animate-slide-up">
    <a
      routerLink="/login"
      class="group flex items-center gap-2 text-white/40 hover:text-white transition-all font-bold text-xs sm:text-sm mb-6 sm:mb-8 justify-center"
    >
      <lucide-icon
        [img]="ArrowLeftIcon"
        [size]="18"
        class="group-hover:-translate-x-1 transition-transform"
      ></lucide-icon>
      {{ t('backToSignIn') }}
    </a>

    <div
      class="w-full rounded-[2rem] sm:rounded-[2.5rem] border border-white/15 bg-white/5 backdrop-blur-2xl p-6 sm:p-10 shadow-2xl relative"
    >
      <div
        class="absolute top-0 left-1/2 -translate-x-1/2 w-24 sm:w-32 h-1 bg-ui-green rounded-b-full shadow-[0_0_15px_#57c84d]"
      ></div>

      <div class="text-center mb-8">
        <div
          class="w-14 h-14 sm:w-16 sm:h-16 bg-ui-green/10 border border-ui-green/20 rounded-2xl flex items-center justify-center mx-auto mb-5 sm:mb-6"
        >
          <lucide-icon [img]="KeyIcon" [size]="30" class="text-ui-green"></lucide-icon>
        </div>
        <h1 class="text-3xl sm:text-4xl font-black text-white tracking-tight">{{ t('newPassword') }}</h1>
        <p class="text-white text-xs sm:text-sm mt-3 font-medium">
          {{ t('subtitle') }}
        </p>
      </div>

      <div
        *ngIf="info"
        class="mb-6 rounded-2xl border border-white/10 bg-white/5 p-3 sm:p-4 text-[11px] sm:text-xs text-white/70 flex items-start gap-3 animate-fade-in"
      >
        <lucide-icon
          [img]="InfoIcon"
          [size]="16"
          class="shrink-0 mt-0.5 text-ui-green"
        ></lucide-icon>
        <span>{{ info }}</span>
      </div>

      <div
        *ngIf="error"
        class="mb-6 rounded-2xl border border-red-500/20 bg-red-500/10 p-3 sm:p-4 text-[11px] sm:text-xs text-red-300 flex items-start gap-3 animate-shake"
      >
        <lucide-icon [img]="AlertCircleIcon" [size]="16" class="shrink-0 mt-0.5"></lucide-icon>
        <span>{{ error }}</span>
      </div>

      <form class="space-y-4 sm:space-y-5" [formGroup]="form" (ngSubmit)="submit()">
        <div class="space-y-2 opacity-60">
          <label class="block text-[10px] font-black text-white uppercase tracking-[0.15em] ml-1">
            {{ t('email') }}
          </label>
          <div class="relative">
            <div class="absolute left-4 top-1/2 -translate-y-1/2 text-white/20">
              <lucide-icon [img]="MailIcon" [size]="18"></lucide-icon>
            </div>
            <input
              type="email"
              formControlName="email"
              class="w-full h-11 sm:h-12 rounded-xl bg-white/[0.02] border border-white/5 pl-12 pr-4 text-white/50 font-bold outline-none cursor-not-allowed"
              [placeholder]="t('emailPlaceholder')"
              readonly
            />
          </div>
        </div>

        <div class="space-y-2">
          <label class="block text-[10px] font-black text-white uppercase tracking-[0.15em] ml-1">
            {{ t('recoveryCode') }}
          </label>
          <div class="relative group">
            <div
              class="absolute left-4 top-1/2 -translate-y-1/2 text-white/20 group-focus-within:text-ui-green transition-colors"
            >
              <lucide-icon [img]="HashIcon" [size]="18"></lucide-icon>
            </div>
            <input
              type="text"
              inputmode="numeric"
              maxlength="6"
              formControlName="code"
              class="w-full h-12 sm:h-14 rounded-2xl bg-white/5 border border-white/10 pl-12 pr-4 text-white outline-none focus:bg-white/10 focus:border-ui-green/40 transition-all font-black text-lg sm:text-xl tracking-[0.2em] sm:tracking-[0.3em] placeholder:tracking-normal placeholder:text-white/10"
              placeholder="000000"
            />
          </div>
        </div>

        <div class="space-y-2">
          <label class="block text-[10px] font-black text-white uppercase tracking-[0.15em] ml-1">
            {{ t('newPasswordLabel') }}
          </label>
          <div class="relative group">
            <div
              class="absolute left-4 top-1/2 -translate-y-1/2 text-white/20 group-focus-within:text-ui-green transition-colors"
            >
              <lucide-icon [img]="LockIcon" [size]="18"></lucide-icon>
            </div>
            <input
              type="password"
              formControlName="newPassword"
              class="w-full h-12 sm:h-14 rounded-2xl bg-white/5 border border-white/10 pl-12 pr-4 text-white placeholder:text-white/20 outline-none focus:bg-white/10 focus:border-ui-green/40 transition-all font-bold"
              placeholder="********"
            />
          </div>
          <p class="text-[10px] text-white ml-1">{{ t('passwordHint') }}</p>
        </div>

        <button
          type="submit"
          [disabled]="loading || form.invalid"
          class="cursor-pointer w-full h-12 sm:h-14 rounded-2xl bg-white/5 border border-white/10 text-white font-black uppercase tracking-widest text-xs sm:text-sm flex items-center justify-center gap-2 hover:bg-white/10 transition-all active:scale-[0.98]"
        >
          <span *ngIf="!loading">{{ t('updatePassword') }}</span>
          <div
            *ngIf="loading"
            class="w-5 h-5 border-2 border-ui-base/30 border-t-ui-base rounded-full animate-spin"
          ></div>
        </button>
      </form>

      <div class="mt-8 pt-6 border-t border-white/5 text-center">
        <a
          routerLink="/login"
          class="text-xs font-bold text-white hover:text-white transition-colors"
        >
          {{ t('cancelAndReturn') }}
        </a>
      </div>
    </div>
  </div>
</div>
