<div
  class="min-h-screen w-full flex items-center justify-center px-4 py-10 relative overflow-hidden"
>
  <div
    class="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] bg-ui-green/10 rounded-full blur-[140px] pointer-events-none"
  ></div>
  <div
    class="absolute bottom-[-10%] right-[-10%] w-[500px] h-[500px] bg-white/5 rounded-full blur-[140px] pointer-events-none"
  ></div>

  <div class="w-full max-w-md z-10 animate-slide-up">
    <a
      routerLink="/login"
      class="group flex items-center gap-2 text-white/40 hover:text-white transition-all font-bold text-sm mb-8 justify-center"
    >
      <lucide-icon
        [img]="ArrowLeftIcon"
        [size]="18"
        class="group-hover:-translate-x-1 transition-transform"
      ></lucide-icon>
      Back to Sign In
    </a>

    <div
      class="w-full rounded-[2.5rem] border border-white/15 bg-white/5 backdrop-blur-2xl p-10 shadow-2xl relative"
    >
      <div
        class="absolute top-0 left-1/2 -translate-x-1/2 w-32 h-1 bg-ui-green rounded-b-full shadow-[0_0_15px_#57c84d]"
      ></div>

      <div class="text-center mb-8">
        <div
          class="w-16 h-16 bg-ui-green/10 border border-ui-green/20 rounded-2xl flex items-center justify-center mx-auto mb-6"
        >
          <lucide-icon [img]="KeyIcon" [size]="32" class="text-ui-green"></lucide-icon>
        </div>
        <h1 class="text-4xl font-black text-white tracking-tight">New Password</h1>
        <p class="text-white text-sm mt-3 font-medium">
          Create a strong password to secure your account.
        </p>
      </div>

      <div
        *ngIf="info"
        class="mb-6 rounded-2xl border border-white/10 bg-white/5 p-4 text-xs text-white/70 flex items-start gap-3 animate-fade-in"
      >
        <lucide-icon
          [img]="InfoIcon"
          [size]="16"
          class="shrink-0 mt-0.5 text-ui-green"
        ></lucide-icon>
        <span>{{ info }}</span>
      </div>

      <div
        *ngIf="error"
        class="mb-6 rounded-2xl border border-red-500/20 bg-red-500/10 p-4 text-xs text-red-300 flex items-start gap-3 animate-shake"
      >
        <lucide-icon [img]="AlertCircleIcon" [size]="16" class="shrink-0 mt-0.5"></lucide-icon>
        <span>{{ error }}</span>
      </div>

      <form class="space-y-5" [formGroup]="form" (ngSubmit)="submit()">
        <div class="space-y-2 opacity-60">
          <label class="block text-[10px] font-black text-white uppercase tracking-[0.15em] ml-1"
            >Email</label
          >
          <div class="relative">
            <div class="absolute left-4 top-1/2 -translate-y-1/2 text-white/20">
              <lucide-icon [img]="MailIcon" [size]="18"></lucide-icon>
            </div>
            <input
              type="email"
              formControlName="email"
              class="w-full h-12 rounded-xl bg-white/[0.02] border border-white/5 pl-12 pr-4 text-white/50 font-bold outline-none cursor-not-allowed"
              placeholder="you@example.com"
              readonly
            />
          </div>
        </div>

        <div class="space-y-2">
          <label class="block text-[10px] font-black text-white uppercase tracking-[0.15em] ml-1"
            >Recovery Code</label
          >
          <div class="relative group">
            <div
              class="absolute left-4 top-1/2 -translate-y-1/2 text-white/20 group-focus-within:text-ui-green transition-colors"
            >
              <lucide-icon [img]="HashIcon" [size]="18"></lucide-icon>
            </div>
            <input
              type="text"
              inputmode="numeric"
              maxlength="6"
              formControlName="code"
              class="w-full h-14 rounded-2xl bg-white/5 border border-white/10 pl-12 pr-4 text-white outline-none focus:bg-white/10 focus:border-ui-green/40 transition-all font-black text-xl tracking-[0.3em] placeholder:tracking-normal placeholder:text-white/10"
              placeholder="000000"
            />
          </div>
        </div>

        <div class="space-y-2">
          <label class="block text-[10px] font-black text-white uppercase tracking-[0.15em] ml-1"
            >New Password</label
          >
          <div class="relative group">
            <div
              class="absolute left-4 top-1/2 -translate-y-1/2 text-white/20 group-focus-within:text-ui-green transition-colors"
            >
              <lucide-icon [img]="LockIcon" [size]="18"></lucide-icon>
            </div>
            <input
              type="password"
              formControlName="newPassword"
              class="w-full h-14 rounded-2xl bg-white/5 border border-white/10 pl-12 pr-4 text-white placeholder:text-white/20 outline-none focus:bg-white/10 focus:border-ui-green/40 transition-all font-bold"
              placeholder="••••••••"
            />
          </div>
          <p class="text-[10px] text-white ml-1">Must be at least 8 characters.</p>
        </div>

        <button
          type="submit"
          [disabled]="loading || form.invalid"
          class="cursor-pointer w-full h-14 rounded-2xl bg-white/5 border border-white/10 text-white font-black uppercase tracking-widest text-sm flex items-center justify-center gap-2 hover:bg-white/10 transition-all active:scale-[0.98]"
        >
          <span *ngIf="!loading">Update Password</span>
          <div
            *ngIf="loading"
            class="w-5 h-5 border-2 border-ui-base/30 border-t-ui-base rounded-full animate-spin"
          ></div>
        </button>
      </form>

      <div class="mt-8 pt-6 border-t border-white/5 text-center">
        <a
          routerLink="/login"
          class="text-xs font-bold text-white hover:text-white transition-colors"
        >
          Cancel and return to Sign In
        </a>
      </div>
    </div>
  </div>
</div>
