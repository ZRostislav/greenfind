<div class="min-h-screen w-full flex items-center justify-center px-4 py-10">
  <div class="w-full max-w-md rounded-3xl border border-white/10 bg-white/5 backdrop-blur p-8">
    <h1 class="text-3xl font-extrabold text-white tracking-tight">Sign in</h1>
    <p class="text-white/60 text-sm mt-2">Use email/password or OAuth.</p>

    <div *ngIf="error" class="mt-4 rounded-2xl border border-red-500/30 bg-red-500/10 p-3 text-sm text-red-200">
      {{ error }}
    </div>

    <form class="mt-6 space-y-4" [formGroup]="form" (ngSubmit)="submit()">
      <div>
        <label class="block text-xs font-bold text-white/70 mb-2">Email</label>
        <input
          type="email"
          formControlName="email"
          class="w-full h-12 rounded-2xl bg-white/5 border border-white/10 px-4 text-white outline-none focus:border-white/30"
          placeholder="you@example.com"
        />
      </div>

      <div>
        <label class="block text-xs font-bold text-white/70 mb-2">Password</label>
        <input
          type="password"
          formControlName="password"
          class="w-full h-12 rounded-2xl bg-white/5 border border-white/10 px-4 text-white outline-none focus:border-white/30"
          placeholder="••••••••"
        />
      </div>

      <button
        type="submit"
        [disabled]="loading || form.invalid"
        class="w-full h-12 rounded-2xl bg-ui-green text-ui-base font-extrabold disabled:opacity-50 disabled:cursor-not-allowed"
      >
        {{ loading ? 'Signing in…' : 'Sign in' }}
      </button>
    </form>

    <div class="mt-6 grid grid-cols-1 gap-3">
      <a
        class="h-12 rounded-2xl border border-white/15 bg-white/5 hover:bg-white/10 text-white flex items-center justify-center font-bold"
        [href]="googleUrl"
      >
        Continue with Google
      </a>
      <a
        class="h-12 rounded-2xl border border-white/15 bg-white/5 hover:bg-white/10 text-white flex items-center justify-center font-bold"
        [href]="githubUrl"
      >
        Continue with GitHub
      </a>
    </div>

    <div class="mt-6 flex items-center justify-between text-sm text-white/60">
      <a routerLink="/register" class="hover:text-white">Create account</a>
      <a routerLink="/forgot-password" class="hover:text-white">Forgot password?</a>
    </div>
  </div>
</div>
