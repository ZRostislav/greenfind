<div class="min-h-screen flex flex-col items-center pt-[15vh] px-4 relative w-full overflow-y-auto">
  <div class="absolute top-0 left-0 w-full h-full pointer-events-none overflow-hidden z-0">
    <div
      class="absolute top-[-10%] left-[20%] w-[500px] h-[500px] bg-white rounded-full blur-[160px] opacity-20 animate-pulse-slow"
    ></div>
    <div
      class="absolute bottom-[-10%] right-[10%] w-[600px] h-[600px] bg-[#57c84d] rounded-full blur-[180px] opacity-20 animate-float"
    ></div>
  </div>

  <div class="w-full max-w-5xl z-10 flex flex-col items-center relative">
    <div class="flex items-center mb-7 animate-slide-up" style="animation-delay: 0.1s">
      <h1 class="text-6xl md:text-7xl font-bold tracking-tighter text-white drop-shadow-lg">
        GreenFind
      </h1>
    </div>

    <div
      class="w-full max-w-2xl relative group mb-5 animate-slide-up"
      style="animation-delay: 0.2s"
    >
      <div class="relative w-full">
        <input
          type="text"
          [(ngModel)]="query"
          (keydown.enter)="search()"
          placeholder="Search for anything..."
          class="w-full h-[60px] pl-10 pr-[190px] text-2xl font-bold text-white placeholder-white/50 bg-white/10 backdrop-blur-lg border border-white/20 rounded-[20px] focus:outline-none focus:border-white/40 focus:bg-white/15 transition-all shadow-[0_8px_32px_rgba(0,0,0,0.1)]"
          [class.voice-input--listening]="isListening()"
        />
        <button
          (click)="toggleVoiceInput()"
          [disabled]="!speechSupported()"
          [title]="isListening() ? 'Stop voice input' : 'Start voice input'"
          class="voice-mic-btn"
          [class.voice-mic-btn--listening]="isListening()"
          [class.voice-mic-btn--disabled]="!speechSupported()"
        >
          <span class="voice-mic-btn__glow" aria-hidden="true"></span>
          <span class="voice-mic-btn__ring voice-mic-btn__ring--one" aria-hidden="true"></span>
          <span class="voice-mic-btn__ring voice-mic-btn__ring--two" aria-hidden="true"></span>
          <lucide-icon [img]="MicIcon" class="text-2xl voice-mic-btn__icon"></lucide-icon>
        </button>
        <button
          (click)="search()"
          class="absolute cursor-pointer hover:text-white right-2 top-2 bottom-2 text-white/40 px-3 font-bold transition-all"
        >
          <lucide-icon [img]="SearchIcon" class="text-2xl"></lucide-icon>
        </button>
      </div>
      <div
        *ngIf="voiceError() && !isListening()"
        class="mt-2 px-2 text-xs text-red-200 bg-red-500/10 border border-red-400/20 rounded-xl py-2"
      >
        {{ voiceError() }}
      </div>
    </div>
    <div *ngIf="isListening()" class="hidden">
      <div
        class="inline-flex items-center gap-2 rounded-xl border border-red-300/30 bg-red-500/10 px-3 py-1 text-xs font-semibold text-red-100"
      >
        <span
          class="w-2 h-2 rounded-full bg-red-400 shadow-[0_0_12px_rgba(248,113,113,0.95)]"
        ></span>
        Listening...
      </div>
      <div
        *ngIf="finalTranscript() || liveTranscript()"
        class="mt-2 text-sm text-white/80 bg-white/10 border border-white/15 rounded-xl px-4 py-2 backdrop-blur"
      >
        <span class="text-white">
          {{ finalTranscript() }}
        </span>

        <span class="text-white/60 italic">
          {{ liveTranscript() }}
        </span>
      </div>
    </div>
    <div
      *ngIf="voiceError() && !isListening()"
      class="mt-2 px-2 text-xs text-red-200 bg-red-500/10 border border-red-400/20 rounded-xl py-2"
    >
      {{ voiceError() }}
    </div>

    <button
      (click)="showFilters = !showFilters"
      class="mb-8 flex cursor-pointer items-center gap-3 transition-all duration-500 ease-in-out font-semibold text-lg py-3 px-8 rounded-[20px] border backdrop-blur-md select-none animate-slide-up shadow-[0_4px_16px_rgba(0,0,0,0.1)] whitespace-nowrap"
      [ngClass]="
        hasFilters
          ? 'text-white border-white/20 bg-white/10 hover:bg-white/20'
          : 'text-white/40 border-white/10 bg-white/5 hover:text-white/60 hover:bg-white/10'
      "
    >
      <lucide-icon
        [img]="SlidersIcon"
        class="transition-transform duration-500"
        [size]="20"
      ></lucide-icon>

      <span
        [ngClass]="
          hasFilters
            ? 'w-2.5 h-2.5 bg-ui-green-light rounded-[20px] shadow-[0_0_10px_#57c84d]'
            : 'absolute display-none'
        "
      ></span>
    </button>

    <div
      *ngIf="showFilters"
      @filtersAnim
      class="w-full grid grid-cols-1 md:grid-cols-2 gap-6 origin-top pb-12 items-stretch text-white"
    >
      <div class="space-y-6 flex flex-col">
        <div
          class="h-[520px] flex flex-col bg-white/10 backdrop-blur-xl border border-white/20 rounded-[2rem] p-7 shadow-2xl"
        >
          <div class="flex-1 overflow-y-auto custom-scrollbar pr-2">
            <label class="flex items-center gap-3 font-bold text-xl mb-5 opacity-90">
              <lucide-icon [img]="GlobeIcon" class="text-white/70" [size]="20"></lucide-icon> Region
            </label>

            <div class="relative mb-5">
              <input
                type="text"
                [(ngModel)]="regionQuery"
                placeholder="Search country..."
                class="w-full h-14 pl-5 pr-[100px] text-base font-medium bg-white/5 border border-white/10 rounded-2xl focus:outline-none focus:border-white/40 focus:bg-white/10 transition-all placeholder:text-white/30"
              />
              <div
                *ngIf="selectedCountry"
                class="absolute right-2 top-2 bottom-2 bg-white/20 border border-white/30 backdrop-blur-md px-3 rounded-xl flex items-center gap-2 font-bold text-sm animate-pop-in"
              >
                {{ selectedCountry.code }}
                <img
                  *ngIf="selectedCountry"
                  [src]="'/3x2/' + selectedCountry.code + '.svg'"
                  class="w-5 h-4 rounded-sm shadow"
                />
                <button
                  (click)="clearRegion()"
                  class="hover:text-red-400 transition-colors cursor-pointer"
                >
                  <lucide-icon [img]="XIcon" [size]="14"></lucide-icon>
                </button>
              </div>
            </div>

            <div class="flex flex-wrap gap-2">
              <button
                *ngFor="let country of filteredRegions()"
                (click)="selectRegion(country)"
                class="flex gap-2 cursor-pointer px-4 py-2 bg-white/5 hover:bg-white/20 border border-white/10 rounded-xl text-xs font-semibold transition-all active:scale-95"
              >
                {{ country.code }}
                <img
                  *ngIf="country"
                  [src]="'/3x2/' + country.code + '.svg'"
                  class="w-5 h-4 rounded-sm shadow"
                />
              </button>
            </div>
          </div>
        </div>
      </div>

      <div class="space-y-6 flex flex-col">
        <div
          class="h-[520px] flex flex-col bg-white/10 backdrop-blur-xl border border-white/20 rounded-[2rem] p-7 shadow-2xl"
        >
          <div class="flex-1 overflow-y-auto custom-scrollbar pr-3 space-y-8">
            <section style="margin: 0">
              <label class="flex items-center gap-3 font-bold text-xl mb-5 opacity-90">
                <lucide-icon [img]="TypeIcon" class="text-white/70" [size]="20"></lucide-icon>
                Word Filters
              </label>

              <div class="space-y-4">
                <div class="relative flex items-center">
                  <input
                    [(ngModel)]="exactInput"
                    (keydown.enter)="addWord('exact')"
                    placeholder="Exact words..."
                    class="w-full h-14 pl-5 pr-[100px] text-base font-medium bg-white/5 border border-white/10 rounded-2xl focus:outline-none focus:border-white/40 focus:bg-white/10 transition-all placeholder:text-white/30"
                  />
                  <button
                    (click)="addWord('exact')"
                    class="absolute right-1.5 w-9 h-9 bg-emerald-500/20 border border-emerald-500/30 rounded-xl flex items-center justify-center hover:bg-emerald-500/40 text-emerald-400 transition-all"
                  >
                    <lucide-icon [img]="PlusIcon" [size]="18"></lucide-icon>
                  </button>
                </div>

                <div class="flex flex-wrap gap-2">
                  <span
                    *ngFor="let word of exactWords"
                    class="bg-emerald-500/10 border border-emerald-500/30 px-3 py-1.5 rounded-xl text-xs font-bold text-emerald-400 flex items-center gap-2 animate-pop-in"
                  >
                    "{{ word }}"
                    <button
                      (click)="removeWord('exact', word)"
                      class="hover:text-red-400 transition-colors"
                    >
                      <lucide-icon [img]="XIcon" [size]="12"></lucide-icon>
                    </button>
                  </span>
                </div>

                <div class="relative flex items-center">
                  <input
                    [(ngModel)]="excludeInput"
                    (keydown.enter)="addWord('exclude')"
                    placeholder="Exclude words..."
                    class="w-full h-14 pl-5 pr-[100px] text-base font-medium bg-white/5 border border-white/10 rounded-2xl focus:outline-none focus:border-white/40 focus:bg-white/10 transition-all placeholder:text-white/30"
                  />
                  <button
                    (click)="addWord('exclude')"
                    class="absolute right-1.5 w-9 h-9 bg-red-500/20 border border-red-500/30 rounded-xl flex items-center justify-center hover:bg-red-500/40 text-red-400 transition-all"
                  >
                    <lucide-icon [img]="MinusIcon" [size]="18"></lucide-icon>
                  </button>
                </div>

                <div class="flex flex-wrap gap-2">
                  <span
                    *ngFor="let word of excludeWords"
                    class="bg-red-500/10 border border-red-500/30 px-3 py-1.5 rounded-xl text-xs font-bold text-red-400 flex items-center gap-2 animate-pop-in"
                  >
                    - {{ word }}
                    <button
                      (click)="removeWord('exclude', word)"
                      class="hover:text-white transition-colors"
                    >
                      <lucide-icon [img]="XIcon" [size]="12"></lucide-icon>
                    </button>
                  </span>
                </div>
              </div>
            </section>

            <hr class="border-white/5" style="margin: 10px 0" />

            <section style="margin: 0">
              <label class="flex items-center gap-3 font-bold text-xl mb-5 opacity-90">
                <lucide-icon [img]="FileTextIcon" class="text-white/70" [size]="20"></lucide-icon>
                File Types
              </label>
              <div class="flex flex-wrap gap-2">
                <button
                  *ngFor="let type of fileTypes"
                  (click)="toggleFileType(type)"
                  class="cursor-pointer px-4 py-1.5 rounded-[7px] text-[10px] font-black uppercase tracking-[0.1em] transition-all border flex items-center justify-center"
                  [ngClass]="
                    fileTypesSelected.includes(type)
                      ? 'bg-white/20 border-white/40 text-white'
                      : 'bg-white/5 border-white/10 text-white/40 hover:border-white/30 hover:text-white/70'
                  "
                  style="padding-bottom: 0.2rem"
                >
                  {{ type }}
                </button>
              </div>
            </section>

            <hr class="border-white/5" style="margin: 10px 0" />

            <section style="margin: 0">
              <label class="flex items-center gap-3 font-bold text-xl mb-5 opacity-90">
                <lucide-icon [img]="LinkIcon" class="text-white/70" [size]="20"></lucide-icon>
                Specific Site
              </label>

              <div class="relative group">
                <div
                  class="min-h-[56px] flex items-center flex-wrap gap-2 w-full p-2 bg-white/5 border border-white/10 rounded-2xl focus-within:border-white/30 focus-within:bg-white/10 transition-all"
                >
                  <div
                    *ngIf="activeSite"
                    class="flex items-center gap-2 bg-white/15 border border-white/20 px-4 py-2 rounded-xl font-bold text-sm text-white animate-pop-in shadow-sm"
                  >
                    <span class="opacity-70 text-xs">site:</span>{{ activeSite }}
                    <button
                      (click)="removeSite()"
                      class="cursor-pointer ml-1 text-white/40 hover:text-red-400 transition-colors"
                    >
                      <lucide-icon [img]="XIcon" [size]="14"></lucide-icon>
                    </button>
                  </div>

                  <input
                    *ngIf="!activeSite"
                    [(ngModel)]="siteInput"
                    (keyup.enter)="applySite()"
                    placeholder="example.com"
                    class="flex-1 min-w-[150px] bg-transparent border-none outline-none px-3 text-base font-medium text-white placeholder:text-white/20"
                  />

                  <button
                    *ngIf="!activeSite && siteInput"
                    (click)="applySite()"
                    class="cursor-pointer absolute right-2 top-2 bottom-2 w-10 bg-white/20 hover:bg-white/40 text-white border border-white/20 rounded-xl flex items-center justify-center transition-all"
                  >
                    <lucide-icon [img]="CheckIcon" [size]="18"></lucide-icon>
                  </button>
                </div>
              </div>
            </section>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
