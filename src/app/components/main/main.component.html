<div class="min-h-screen flex flex-col items-center pt-[25vh] px-4 relative w-full overflow-y-auto">
  <div class="absolute top-0 left-0 w-full h-full pointer-events-none overflow-hidden z-0">
    <div
      class="absolute top-[-10%] left-[20%] w-[500px] h-[500px] bg-white rounded-full blur-[160px] opacity-20 animate-pulse-slow"
    ></div>
    <div
      class="absolute bottom-[-10%] right-[10%] w-[600px] h-[600px] bg-[#57c84d] rounded-full blur-[180px] opacity-20 animate-float"
    ></div>
  </div>

  <div class="w-full max-w-5xl z-10 flex flex-col items-center relative">
    <div class="flex items-center gap-4 mb-10 animate-slide-up" style="animation-delay: 0.1s">
      <h1 class="text-7xl md:text-8xl font-bold tracking-tighter text-white drop-shadow-lg">
        GreenFind
      </h1>
    </div>

    <div
      class="w-full max-w-3xl relative group mb-8 animate-slide-up"
      style="animation-delay: 0.2s"
    >
      <div class="relative w-full">
        <input
          type="text"
          [(ngModel)]="query"
          (keydown.enter)="search()"
          placeholder="Search for anything..."
          class="w-full h-[85px] pl-10 pr-[140px] text-2xl font-bold text-white placeholder-white/50 bg-white/10 backdrop-blur-lg border border-white/20 rounded-[40px] focus:outline-none focus:border-white/40 focus:bg-white/15 transition-all shadow-[0_8px_32px_rgba(0,0,0,0.1)]"
        />
        <button
          (click)="search()"
          class="absolute cursor-pointer right-2 top-2 bottom-2 bg-white/10 hover:bg-white/20 border border-white/20 text-white px-8 rounded-[40px] font-bold text-xl transition-all duration-300 shadow-lg hover:shadow-xl active:scale-95 flex items-center justify-center backdrop-blur-md"
        >
          Search
        </button>
      </div>
    </div>

    <button
      (click)="showFilters = !showFilters"
      [style.width.px]="showFilters ? 220 : 260"
      class="mb-8 flex cursor-pointer items-center gap-3 text-white/80 hover:text-white transition-all duration-500 ease-in-out font-semibold text-lg py-3 px-8 rounded-full border border-white/20 bg-white/5 backdrop-blur-md hover:bg-white/10 select-none animate-slide-up shadow-[0_4px_16px_rgba(0,0,0,0.1)] whitespace-nowrap"
      style="animation-delay: 0.3s"
    >
      <lucide-icon
        [img]="SlidersIcon"
        class="transition-transform duration-500"
        [class.rotate-180]="showFilters"
        [size]="20"
      ></lucide-icon>
      {{ showFilters ? 'Hide Filters' : 'Advanced Filters' }}
      <span
        *ngIf="hasActiveFilters()"
        class="w-2.5 h-2.5 bg-[#57c84d] rounded-full shadow-[0_0_10px_#57c84d]"
      ></span>
    </button>

    <div
      *ngIf="showFilters"
      class="w-full grid grid-cols-1 md:grid-cols-2 gap-6 animate-pop-in origin-top pb-12 items-stretch"
    >
      <div class="space-y-6 flex flex-col">
        <div
          class="h-[300px] flex flex-col bg-white/10 backdrop-blur-md border border-white/20 rounded-3xl p-8 shadow-lg"
        >
          <div class="flex-1 overflow-y-auto custom-scrollbar pr-2">
            <label class="flex items-center gap-3 text-white font-bold text-2xl mb-4">
              <lucide-icon [img]="GlobeIcon" class="text-white/80" [size]="24"></lucide-icon> Region
            </label>

            <div class="relative mb-4">
              <input
                type="text"
                [(ngModel)]="regionQuery"
                placeholder="Type country..."
                class="w-full py-3 px-6 text-lg font-semibold text-white placeholder-white/40 bg-white/5 border border-white/20 rounded-2xl focus:outline-none focus:border-white/50 transition-all"
              />
              <div
                *ngIf="selectedCountry"
                class="absolute right-2 top-2 bottom-2 bg-[#57c84d]/30 border border-[#57c84d]/50 backdrop-blur-md text-white px-4 rounded-xl flex items-center gap-2 font-bold shadow-md animate-pop-in"
              >
                {{ selectedCountry.code }}
                <button (click)="clearRegion()" class="hover:text-red-300 transition-colors">
                  <lucide-icon [img]="XIcon" [size]="14"></lucide-icon>
                </button>
              </div>
            </div>

            <div class="flex flex-wrap gap-2 max-h-32 overflow-y-auto custom-scrollbar pr-2">
              <button
                *ngFor="let country of filteredRegions()"
                (click)="selectRegion(country)"
                class="px-4 py-1.5 bg-white/5 hover:bg-white/20 text-white/90 border border-white/10 rounded-full text-sm font-medium transition-all"
              >
                {{ country.code }}
              </button>
            </div>
          </div>
        </div>

        <div
          class="h-[200px] flex flex-col bg-white/10 backdrop-blur-md border border-white/20 rounded-3xl p-8 shadow-lg"
        >
          <div class="flex-1 overflow-y-auto custom-scrollbar pr-2">
            <label class="flex items-center gap-3 text-white font-bold text-2xl mb-4">
              <lucide-icon [img]="LinkIcon" class="text-white/80" [size]="24"></lucide-icon>
              Specific Site
            </label>

            <div
              class="group flex items-center flex-wrap gap-2 w-full min-h-[56px] py-2 px-4 bg-white/5 border border-white/20 rounded-2xl focus-within:border-white/50 focus-within:ring-1 focus-within:ring-white/20 transition-all relative"
            >
              <div
                *ngIf="activeSite"
                class="flex items-center gap-2 bg-white/20 backdrop-blur-md border border-white/30 text-white px-3 py-1.5 rounded-xl font-bold text-sm animate-pop-in shadow-none"
              >
                <span class="drop-shadow-none">
                  {{ activeSite }}
                </span>

                <button
                  (click)="removeSite()"
                  class="bg-red-500/20 p-0.5 rounded-full text-red-300 hover:bg-red-500/40 hover:text-white transition-all"
                >
                  <lucide-icon [img]="XIcon" [size]="12"></lucide-icon>
                </button>
              </div>

              <input
                *ngIf="!activeSite"
                [(ngModel)]="siteInput"
                (keyup.enter)="applySite()"
                placeholder="example.com"
                class="flex-1 min-w-[120px] bg-transparent border-none outline-none text-lg font-semibold text-white placeholder-white/40"
              />

              <button
                *ngIf="!activeSite && siteInput"
                (click)="applySite()"
                class="absolute right-2 top-2 bottom-2 w-10 bg-white/10 border border-white/20 rounded-xl flex items-center justify-center text-white hover:bg-white/30 transition-colors"
              >
                <lucide-icon [img]="CheckIcon" [size]="18"></lucide-icon>
              </button>
            </div>

            <p *ngIf="activeSite" class="text-xs mt-3 px-2">
              Удалите текущий сайт, чтобы ввести новый
            </p>
          </div>
        </div>
      </div>

      <div class="space-y-6 flex flex-col">
        <div
          class="h-[300px] flex flex-col bg-white/10 backdrop-blur-md border border-white/20 rounded-3xl p-8 shadow-lg"
        >
          <div class="flex-1 overflow-y-auto custom-scrollbar pr-2">
            <label class="flex items-center gap-3 text-white font-bold text-2xl mb-6">
              <lucide-icon [img]="TypeIcon" class="text-white/80" [size]="24"></lucide-icon> Word
              Filters
            </label>

            <div class="mb-6">
              <div class="flex gap-2 mb-3 relative">
                <input
                  [(ngModel)]="exactInput"
                  (keydown.enter)="addWord('exact')"
                  placeholder="Exact words..."
                  class="w-full py-3 pl-6 pr-16 text-lg font-semibold text-white placeholder-white/40 bg-white/5 border border-white/20 rounded-2xl focus:outline-none focus:border-white/50 transition-all"
                />
                <button
                  (click)="addWord('exact')"
                  class="absolute right-1 top-1 bottom-1 w-12 bg-white/10 border border-white/20 rounded-xl flex items-center justify-center text-white hover:bg-white/30 transition-colors"
                >
                  <lucide-icon [img]="PlusIcon" [size]="22"></lucide-icon>
                </button>
              </div>
              <div class="flex flex-wrap gap-2">
                <span
                  *ngFor="let word of exactWords"
                  class="bg-[#57c84d]/20 backdrop-blur-md border border-[#57c84d]/40 text-white px-4 py-1.5 rounded-full text-sm font-bold flex items-center gap-2 shadow-sm animate-pop-in"
                >
                  "{{ word }}"
                  <button
                    (click)="removeWord('exact', word)"
                    class="hover:text-red-300 transition-colors"
                  >
                    <lucide-icon [img]="XIcon" [size]="14"></lucide-icon>
                  </button>
                </span>
              </div>
            </div>

            <div>
              <div class="flex gap-2 mb-3 relative">
                <input
                  [(ngModel)]="excludeInput"
                  (keydown.enter)="addWord('exclude')"
                  placeholder="Exclude words..."
                  class="w-full py-3 pl-6 pr-16 text-lg font-semibold text-white placeholder-white/40 bg-white/5 border border-white/20 rounded-2xl focus:outline-none focus:border-white/50 transition-all"
                />
                <button
                  (click)="addWord('exclude')"
                  class="absolute right-1 top-1 bottom-1 w-12 bg-red-500/20 border border-red-500/30 rounded-xl flex items-center justify-center text-red-200 hover:bg-red-500/40 hover:text-white transition-colors"
                >
                  <lucide-icon [img]="MinusIcon" [size]="22"></lucide-icon>
                </button>
              </div>
              <div class="flex flex-wrap gap-2">
                <span
                  *ngFor="let word of excludeWords"
                  class="bg-red-500/20 backdrop-blur-md border border-red-500/30 text-white px-4 py-1.5 rounded-full text-sm font-bold flex items-center gap-2 shadow-sm animate-pop-in"
                >
                  - {{ word }}
                  <button
                    (click)="removeWord('exclude', word)"
                    class="hover:text-red-300 transition-colors"
                  >
                    <lucide-icon [img]="XIcon" [size]="14"></lucide-icon>
                  </button>
                </span>
              </div>
            </div>
          </div>
        </div>

        <div
          class="h-[200px] flex flex-col bg-white/10 backdrop-blur-md border border-white/20 rounded-3xl p-8 shadow-lg"
        >
          <div class="flex-1 overflow-y-auto custom-scrollbar pr-2">
            <label class="flex items-center gap-3 text-white font-bold text-2xl mb-4">
              <lucide-icon [img]="FileTextIcon" class="text-white/80" [size]="24"></lucide-icon>
              File Types
            </label>
            <div class="flex flex-wrap gap-3">
              <button
                *ngFor="let type of fileTypes"
                (click)="toggleFileType(type)"
                class="inline-flex cursor-pointer justify-center items-center px-4 pt-[10px] pb-[8px] rounded-[0.45rem] text-center text-sm font-bold leading-none transition-all duration-300 border uppercase tracking-wide backdrop-blur-md"
                [class]="
                  fileTypesSelected.includes(type)
                    ? 'bg-white/10 text-white border-white/70'
                    : 'bg-white/5 text-white/60 border-white/10 hover:border-white/30 hover:bg-white/10 hover:text-white'
                "
              >
                <span class="translate-y-[1px]">{{ type }}</span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
