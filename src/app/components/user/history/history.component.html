<div
  class="min-h-screen w-full flex flex-col items-center justify-start px-4 py-12 relative overflow-y-auto"
>
  <div
    class="absolute top-[-10%] right-[20%] w-[500px] h-[500px] bg-ui-green/10 rounded-full blur-[150px] pointer-events-none z-0"
  ></div>
  <div
    class="absolute bottom-[10%] left-[5%] w-[400px] h-[400px] bg-white/5 rounded-full blur-[120px] pointer-events-none z-0"
  ></div>

  <div class="w-full max-w-3xl z-10 animate-slide-up">
    <div class="flex items-center justify-between mb-8">
      <button
        (click)="goBack()"
        class="group flex items-center gap-2 text-white/40 hover:text-white transition-all font-bold text-sm"
      >
        <lucide-icon
          [img]="ArrowLeftIcon"
          [size]="18"
          class="group-hover:-translate-x-1 transition-transform"
        ></lucide-icon>
        Back to Search
      </button>
      <a
        routerLink="/me"
        [queryParams]="{ returnUrl: returnUrl }"
        class="px-4 py-2 rounded-xl bg-white/5 border border-white/10 text-white/60 hover:text-white hover:bg-white/10 transition-all font-bold text-sm flex items-center gap-2"
      >
        <lucide-icon [img]="UserIcon" [size]="16"></lucide-icon>
        My Profile
      </a>
    </div>

    <div class="flex items-end gap-4 mb-10">
      <h1 class="text-5xl font-black text-white tracking-tighter">History</h1>
      <span class="text-ui-green font-bold pb-1.5 opacity-80" *ngIf="items().length">
        {{ items().length }} queries
      </span>
    </div>

    <div *ngIf="loading()" class="py-20 flex flex-col items-center">
      <div
        class="w-8 h-8 border-2 border-white/10 border-t-ui-green rounded-full animate-spin mb-4"
      ></div>
      <p class="text-white/30 font-bold uppercase tracking-widest text-xs">Accessing archives...</p>
    </div>

    <div
      *ngIf="error()"
      class="rounded-[2rem] border border-red-500/20 bg-red-500/5 p-6 text-center animate-shake"
    >
      <lucide-icon
        [img]="AlertCircleIcon"
        class="text-red-400 mx-auto mb-3"
        [size]="32"
      ></lucide-icon>
      <div class="text-red-200 font-bold">{{ error() }}</div>
    </div>

    <div
      *ngIf="!loading() && !error() && !items().length"
      class="py-20 rounded-[3rem] border border-white/5 bg-white/[0.02] text-center backdrop-blur-sm"
    >
      <lucide-icon [img]="SearchIcon" class="text-white/10 mx-auto mb-4" [size]="48"></lucide-icon>
      <p class="text-white/40 font-bold text-xl">Your search vault is empty.</p>
      <p class="text-white/20 text-sm mt-1">Queries you make while logged in will appear here.</p>
    </div>

    <div class="space-y-4" *ngIf="items().length">
      <button
        *ngFor="let item of items()"
        (click)="open(item)"
        class="w-full group relative text-left rounded-[2rem] border border-white/10 bg-white/5 hover:bg-white/10 hover:border-white/20 p-6 transition-all duration-300 hover:scale-[1.01] hover:shadow-[0_20px_40px_rgba(0,0,0,0.2)]"
      >
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
          <div class="flex-1 min-w-0">
            <div
              class="text-xl text-white font-bold truncate group-hover:text-ui-green-light transition-colors"
            >
              {{ item.displayQuery }}
            </div>

            <div class="mt-3 flex flex-wrap gap-2">
              <span
                *ngIf="item.region"
                class="inline-flex items-center gap-1.5 px-3 py-1 rounded-lg bg-ui-green/10 border border-ui-green/20 text-[10px] font-black text-ui-green-light uppercase tracking-wider"
              >
                <lucide-icon [img]="GlobeIcon" [size]="10"></lucide-icon>
                {{ item.region }}
              </span>

              <span
                *ngIf="item.parsed.site || item.siteFilter"
                class="inline-flex items-center gap-1.5 px-3 py-1 rounded-lg bg-blue-500/10 border border-blue-500/20 text-[10px] font-black text-blue-400 uppercase tracking-wider"
              >
                <lucide-icon [img]="LinkIcon" [size]="10"></lucide-icon>
                site:{{ item.parsed.site || item.siteFilter }}
              </span>

              <span
                *ngIf="item.parsed.similar"
                class="inline-flex items-center gap-1.5 px-3 py-1 rounded-lg bg-cyan-500/10 border border-cyan-500/20 text-[10px] font-black text-cyan-300 uppercase tracking-wider"
              >
                <lucide-icon [img]="LinkIcon" [size]="10"></lucide-icon>
                related:{{ item.parsed.similar }}
              </span>

              <span
                *ngIf="item.language"
                class="inline-flex items-center gap-1.5 px-3 py-1 rounded-lg bg-purple-500/10 border border-purple-500/20 text-[10px] font-black text-purple-400 uppercase tracking-wider"
              >
                <lucide-icon [img]="LanguagesIcon" [size]="10"></lucide-icon>
                {{ item.language }}
              </span>

              <span
                *ngFor="let word of item.parsed.exact"
                class="inline-flex items-center gap-1.5 px-3 py-1 rounded-lg bg-emerald-500/10 border border-emerald-500/25 text-[10px] font-black text-emerald-300 tracking-wider"
              >
                "{{ word }}"
              </span>

              <span
                *ngFor="let word of item.parsed.exclude"
                class="inline-flex items-center gap-1.5 px-3 py-1 rounded-lg bg-red-500/10 border border-red-500/25 text-[10px] font-black text-red-300 tracking-wider"
              >
                -{{ word }}
              </span>

              <span
                *ngFor="let type of item.parsed.fileTypes"
                class="inline-flex items-center gap-1.5 px-3 py-1 rounded-lg bg-white/10 border border-white/20 text-[10px] font-black text-white/75 uppercase tracking-wider"
              >
                filetype:{{ type }}
              </span>
            </div>
          </div>

          <div class="flex flex-col items-end gap-1 shrink-0">
            <div class="text-[11px] font-black text-white/20 uppercase tracking-tighter">
              Timestamp
            </div>
            <div class="text-sm text-white/50 font-bold">
              {{ item.createdAt | date: 'MMM d, HH:mm' }}
            </div>
          </div>
        </div>

        <div
          class="absolute right-4 top-1/2 -translate-y-1/2 opacity-0 group-hover:opacity-100 group-hover:translate-x-0 translate-x-4 transition-all"
        >
          <lucide-icon [img]="ChevronRightIcon" class="text-ui-green" [size]="24"></lucide-icon>
        </div>
      </button>
    </div>
  </div>
</div>
